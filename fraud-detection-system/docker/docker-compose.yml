services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine

  ml-service:
    build:
      context: ..
      dockerfile: docker/ml-service.Dockerfile
    ports:
      - "8001:8001"

  server:
    build:
      context: ..
      dockerfile: docker/server.Dockerfile
    environment:
      PORT: 5000
      CLIENT_URL: http://localhost:5173
      MONGO_URI: mongodb://mongo:27017/fraud_detection_system
      JWT_SECRET: docker-secret
      ML_SERVICE_URL: http://ml-service:8001
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
      - ml-service
    ports:
      - "5000:5000"

  client:
    build:
      context: ..
      dockerfile: docker/client.Dockerfile
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    depends_on:
      - server
    ports:
      - "5173:5173"

volumes:
  mongo-data:
